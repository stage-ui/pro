<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - STAGE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4B1E83;
            --background: #5A2AA3;
            --accent: #0D10DD;
            --white: #FFFFFF;
            --gold: #FFD700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, var(--primary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo img {
            height: 80px;
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: var(--white);
            opacity: 0.8;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--white);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), #FFA500);
            border: none;
            border-radius: 25px;
            color: #333;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider span {
            padding: 0 15px;
            color: var(--white);
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: var(--white);
            border: none;
            border-radius: 25px;
            color: #333;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        .signup-link {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--white);
            opacity: 0.8;
        }

        .signup-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="logo-stage.webp" alt="STAGE">
            </div>
            
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Login to continue your STAGE journey</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <p class="error-msg" id="errorMsg">Invalid username or password</p>
                
                <button type="submit" class="login-btn">Login</button>
            </form>
            
            <div class="divider">
                <span>or</span>
            </div>
            
            <button class="google-btn" onclick="loginWithGoogle()">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Continue with Google
            </button>
            
            <p class="signup-link">
                Don't have an account? <a href="#" onclick="showSignup()">Sign up</a>
            </p>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (sessionStorage.getItem('userLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // Simple validation - in real app, check against stored users
            if (username.trim() === '') {
                errorMsg.textContent = 'Please enter username';
                errorMsg.classList.add('show');
                return;
            }
            
            if (password.trim() === '') {
                errorMsg.textContent = 'Please enter password';
                errorMsg.classList.add('show');
                return;
            }
            
            // Login successful - store user info
            sessionStorage.setItem('userLoggedIn', 'true');
            sessionStorage.setItem('username', username);
            sessionStorage.setItem('loginTime', new Date().toISOString());
            
            // Redirect to index
            window.location.href = 'index.html';
        });

        function loginWithGoogle() {
            // Simulate Google login - in production, use Google OAuth
            const username = 'Google User';
            sessionStorage.setItem('userLoggedIn', 'true');
            sessionStorage.setItem('username', username);
            sessionStorage.setItem('loginTime', new Date().toISOString());
            sessionStorage.setItem('loginMethod', 'google');
            
            window.location.href = 'index.html';
        }

        function showSignup() {
            alert('Sign up feature coming soon! You can login with any username and password for now.');
        }
    </script>
</body>
</html>
